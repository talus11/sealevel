<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경기도 해수면 상승 시뮬레이터 (API 연동)</title>
    
    <!-- Leaflet.js 지도 라이브러리 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; }
        #map { width: 100%; height: 100%; }
        
        /* 조작 패널 디자인 */
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 320px;
        }
        h3 { margin-top: 0; font-size: 18px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        label { font-size: 14px; font-weight: bold; display: block; margin-top: 10px; }
        input[type="text"], select, button { 
            width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; 
        }
        .highlight-label { color: #d9534f; }
        button { background-color: #0056b3; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px;}
        button:hover { background-color: #004494; }
        
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid #d9534f;
        }
        .highlight { font-size: 24px; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>해수면 상승 전망 시뮬레이터</h3>
        
        <!-- API 키 입력칸 (선생님이 발급받은 디코딩 키를 여기에 붙여넣습니다) -->
        <label for="apiKey" class="highlight-label">1. 공공데이터포털 일반 인증키(Decoding) 입력:</label>
        <input type="text" id="apiKey" placeholder="Decoding 키를 정확히 붙여넣으세요">
        
        <label for="scenarioSelect">2. 기후 시나리오 선택:</label>
        <select id="scenarioSelect">
            <option value="SSP126">SSP1-2.6 (온실가스 획기적 감축)</option>
            <option value="SSP245">SSP2-4.5 (현재 수준 배출 지속)</option>
            <option value="SSP585">SSP5-8.5 (화석연료 의존, 최악의 시나리오)</option>
        </select>
        
        <!-- 데이터 호출 버튼 -->
        <button onclick="fetchSeaLevelData()">기후 데이터 불러오기</button>

        <div class="result-box">
            <span>시흥/경기 서남부 예상 상승폭:</span><br>
            <span class="highlight" id="heightValue">0.00</span> cm
            <div id="statusMsg" style="font-size:12px; color:#666; margin-top:10px;">데이터를 기다리는 중입니다.</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 지도 초기화 (경기 서남부 일대)
        const map = L.map('map').setView([37.38, 126.73], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function fetchSeaLevelData() {
            // 선생님이 입력하신 키를 가져옵니다.
            const apiKey = document.getElementById('apiKey').value.trim();
            const scenario = document.getElementById('scenarioSelect').value;
            const statusMsg = document.getElementById('statusMsg');
            
            if (!apiKey) {
                alert("API 인증키를 입력해주세요!");
                return;
            }

            statusMsg.innerText = "국립해양조사원 서버에 요청 중...";

            // 경기 서남부 위경도 범위 (API 규칙인 1도 이내 차이 적용)
            const ymin = 37.0, ymax = 38.0, xmin = 126.0, xmax = 127.0;
            
            // 일반 인증키(Decoding)를 자바스크립트용으로 안전하게 인코딩(encodeURIComponent)하여 URL에 결합합니다.
            const url = `https://apis.data.go.kr/1192136/changeClimateRising/GetChangeClimateRisingApiService?serviceKey=${encodeURIComponent(apiKey)}&type=json&ymin=${ymin}&ymax=${ymax}&xmin=${xmin}&xmax=${xmax}&pageNo=1&numOfRows=100`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    // API 응답 코드 확인
                    if(data.response.header.resultCode === "00") {
                        const items = data.response.body.items.item;
                        const filteredItems = items.filter(item => item.sspSeCd === scenario);
                        
                        if (filteredItems.length > 0) {
                            let sum = 0;
                            filteredItems.forEach(item => { sum += parseFloat(item.svyVICnt); });
                            const avgRise = (sum / filteredItems.length).toFixed(2);
                            
                            // 계산된 수치를 화면에 표시합니다.
                            document.getElementById('heightValue').innerText = avgRise;
                            statusMsg.innerText = `데이터 수신 성공! (해당 구역 평균값)`;
                        } else {
                            statusMsg.innerText = "해당 시나리오 데이터가 없습니다.";
                        }
                    } else {
                        // 인증키 오류 등 공공데이터포털 서버 측 에러 메시지 출력
                        statusMsg.innerText = `API 에러: ${data.response.header.resultMsg}`;
                    }
                })
                .catch(error => {
                    console.error("Fetch Error:", error);
                    statusMsg.innerText = "오류 발생! 인증키가 정확한지(Decoding) 확인해 주세요.";
                });
        }
    </script>
</body>
</html>
